apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord-rda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discord-rda
  template:
    metadata:
      labels:
        app: discord-rda
    spec:
      containers:
        - name: discord-rda
          image: discord-rda:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: discord-rda-secrets
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
